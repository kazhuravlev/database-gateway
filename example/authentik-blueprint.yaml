version: 1
metadata:
  name: Database Gateway - Local Authentik bootstrap
entries:
  - model: authentik_core.group
    identifiers:
      name: dbgw-users
    attrs:
      name: dbgw-users

  - model: authentik_core.group
    identifiers:
      name: dbgw-admins
    attrs:
      name: dbgw-admins

  - model: authentik_core.user
    identifiers:
      username: admin
    attrs:
      name: Administrator
      email: admin@example.com
      is_active: true
      type: internal
      path: users
      password: password
      groups:
        - !Find [authentik_core.group, [name, "dbgw-admins"]]

  - model: authentik_core.user
    identifiers:
      username: user1
    attrs:
      name: User One
      email: user1@example.com
      is_active: true
      type: internal
      path: users
      password: password
      groups:
        - !Find [authentik_core.group, [name, "dbgw-users"]]

  - model: authentik_providers_oauth2.oauth2provider
    id: dbgw-oidc-provider
    identifiers:
      name: db-gateway-provider
    attrs:
      authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
      client_type: confidential
      client_id: db-gateway
      client_secret: db-gateway-secret
      redirect_uris:
        - matching_mode: strict
          url: http://localhost:8080/auth/callback
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
        - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]

  - model: authentik_core.application
    identifiers:
      slug: db-gateway
    attrs:
      name: Database Gateway
      provider: !KeyOf dbgw-oidc-provider
