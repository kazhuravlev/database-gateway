services:
  authentik-postgres:
    image: postgres:16-alpine
    ports:
      - '127.0.0.1:5436:5432'
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: authentik

  authentik-server:
    image: ghcr.io/goauthentik/server:2026.2.1
    depends_on:
      - authentik-postgres
    command:
      - server
    ports:
      - '127.0.0.1:9000:9000'
    environment:
      AUTHENTIK_SECRET_KEY: "dbgw-local-authentik-secret-key-please-change-in-prod"
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: "akadmin@example.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "password"
      AUTHENTIK_BLUEPRINTS_DIR: "/blueprints"
    volumes:
      - './authentik-blueprint.yaml:/blueprints/custom/dbgw.yaml:ro'

  authentik-worker:
    image: ghcr.io/goauthentik/server:2026.2.1
    depends_on:
      - authentik-postgres
    command:
      - worker
    environment:
      AUTHENTIK_SECRET_KEY: "dbgw-local-authentik-secret-key-please-change-in-prod"
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: authentik
      AUTHENTIK_BOOTSTRAP_EMAIL: "akadmin@example.com"
      AUTHENTIK_BOOTSTRAP_PASSWORD: "password"
      AUTHENTIK_BLUEPRINTS_DIR: "/blueprints"
    volumes:
      - './authentik-blueprint.yaml:/blueprints/custom/dbgw.yaml:ro'

  # This is a primary application storage
  storage-postgres:
    image: postgres:16
    ports:
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_DB: local__dbgw
      POSTGRES_USER: local__dbgw
      POSTGRES_PASSWORD: local__dbgw

  # This is an external databases

  postgres-taxi:
    image: postgres:16
    ports:
      - '127.0.0.1:5433:5432'
    environment:
      POSTGRES_DB: pgtaxi
      POSTGRES_USER: pgtaxi
      POSTGRES_PASSWORD: pgtaxi
    volumes:
      - './init-taxi.sql:/docker-entrypoint-initdb.d/init.sql'

  postgres-5434:
    image: postgres:16
    ports:
      - '127.0.0.1:5434:5432'
    environment:
      POSTGRES_DB: pg5434
      POSTGRES_USER: pg5434
      POSTGRES_PASSWORD: pg5434
    volumes:
      - './init-5434.sql:/docker-entrypoint-initdb.d/init.sql'

  postgres-5435:
    image: postgres:16
    ports:
      - '127.0.0.1:5435:5432'
    environment:
      POSTGRES_DB: pg5435
      POSTGRES_USER: pg5435
      POSTGRES_PASSWORD: pg5435
    volumes:
      - './init-5435.sql:/docker-entrypoint-initdb.d/init.sql'
