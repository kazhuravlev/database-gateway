{{- if not .Values.config.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "database-gateway.configSecretName" . }}
  labels:
    {{- include "database-gateway.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.config.secretKey }}: |
    {{- include "database-gateway.configPayload" . | nindent 4 }}
{{- end }}
